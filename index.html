<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Coordination &amp; Pédagogie</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="hero">
    <button class="hero-inner" id="accueil" title="Revenir à l'accueil" aria-label="Revenir à l'accueil">
      <span class="kicker">Espace interne</span>
      <h1 id="site-titre">Coordination &amp; Pédagogie</h1>
      <span class="home-hint">Cliquer pour revenir à l'accueil</span>
    </button>
  </header>

  <div class="toolbar">
    <div class="search-wrap">
      <input type="search" id="recherche" placeholder="Rechercher…"
             aria-label="Rechercher" />
    </div>
  </div>

  <nav class="breadcrumb" id="fil" aria-label="Fil d'Ariane"></nav>

  <main>
    <div class="grid" id="grille"></div>
  </main>

  <footer>
    <div>Espace réservé à l'équipe pédagogique.</div>
    <span class="rgpd">Aucun nom d'élève ni d'établissement n'est publié sur cet espace.</span>
    <a class="guide-link" href="https://github.com/Preventionsanteenvironnement/coordination-pedagogie/blob/main/GUIDE.md"
       target="_blank" rel="noopener">Guide — ajouter du contenu</a>
  </footer>

  <script src="data.js"></script>
  <script>
    const grille = document.getElementById('grille');
    const fil = document.getElementById('fil');
    const recherche = document.getElementById('recherche');

    document.getElementById('site-titre').textContent = SITE.titre;
    document.title = SITE.titre;

    let path = [];   // pile de dossiers ouverts (du plus haut au plus profond)
    let q = '';

    // Retour à l'accueil — toujours accessible (titre cliquable)
    document.getElementById('accueil').addEventListener('click', () => {
      path = []; q = ''; recherche.value = '';
      rendre();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    const enfantsCourants = () =>
      path.length ? (path[path.length - 1].enfants || []) : THEMATIQUES;
    const couleurTheme = () =>
      path.length ? (path[0].couleur || 'var(--accent)') : null;
    const nom = n => n.nom || n.titre;

    // --- Fil d'Ariane ---
    function rendreFil() {
      if (!path.length) { fil.innerHTML = ''; return; }
      let html = '<button class="crumb" data-i="-1">Accueil</button>';
      path.forEach((n, i) => {
        html += '<span class="sep" aria-hidden="true">›</span>';
        html += `<button class="crumb" data-i="${i}">${nom(n)}</button>`;
      });
      fil.innerHTML = html;
      fil.querySelectorAll('.crumb').forEach(b =>
        b.addEventListener('click', () => {
          path = path.slice(0, +b.dataset.i + 1);
          q = ''; recherche.value = '';
          rendre();
        }));
    }

    // --- Rendu d'un palier ---
    function rendre() {
      rendreFil();
      const couleur = couleurTheme();
      let items = enfantsCourants();
      if (q) items = items.filter(n =>
        (nom(n) + ' ' + (n.desc || '')).toLowerCase().includes(q));

      if (!items.length) {
        grille.innerHTML = q
          ? `<div class="empty">Aucun résultat.</div>`
          : `<div class="panneau">
               <span class="panneau-pic" aria-hidden="true"></span>
               <strong>En cours de préparation</strong>
               <span>Cette rubrique sera bientôt disponible.</span>
             </div>`;
        return;
      }

      grille.innerHTML = items.map((n, idx) => {
        const c = couleur || n.couleur || 'var(--accent)';
        const badge = n.badge ? `<span class="badge">${n.badge}</span>` : '';
        if (n.enfants) {
          return `
            <button class="card branch" data-idx="${idx}" style="--card-accent:${c}">
              ${badge}
              <h3>${nom(n)}</h3>
              <p>${n.desc || ''}</p>
              <div class="meta"><span class="arrow" aria-hidden="true">→</span></div>
            </button>`;
        }
        const externe = /^https?:\/\//.test(n.lien);
        const cible = externe ? ' target="_blank" rel="noopener"' : '';
        return `
          <a class="card" href="${n.lien}"${cible} style="--card-accent:${c}">
            ${badge}
            <h3>${n.titre}</h3>
            <p>${n.desc || ''}</p>
            <div class="meta"><span class="type-tag">${n.type || 'Lien'}</span>
              <span class="arrow" aria-hidden="true">→</span></div>
          </a>`;
      }).join('');

      grille.querySelectorAll('.branch').forEach(b =>
        b.addEventListener('click', () => {
          path.push(items[+b.dataset.idx]);
          q = ''; recherche.value = '';
          rendre();
        }));
    }

    recherche.addEventListener('input', e => { q = e.target.value.trim().toLowerCase(); rendre(); });

    rendre();
  </script>
</body>
</html>

<style>
  :root{
    --bg:#eef2f4;--card:#fff;--ink:#16222b;--soft:#5a6a74;--line:#dce4e8;--line2:#eef2f5;
    --c1:#0e7490;--c1d:#0b596f;--c1soft:#dbeef3;
    --flou-bg:#faeeda;--flou-tx:#854f0b;--deb-bg:#e6f1fb;--deb-tx:#185fa5;--ok-bg:#eaf3de;--ok-tx:#3b6d11;
    --r:16px;--rs:11px;
    --sh:0 1px 2px rgba(16,34,43,.05),0 10px 28px rgba(16,34,43,.07);--shl:0 16px 50px rgba(16,34,43,.22);
  }
  @media (prefers-color-scheme:dark){:root{--bg:#0a1216;--card:#121e24;--ink:#e6eef2;--soft:#9bafb8;--line:#22303700;--line:#243036;--line2:#18242a;--c1:#39b6cf;--c1d:#2f9bb2;--c1soft:#10333d;--flou-bg:#412402;--flou-tx:#fac775;--deb-bg:#042c53;--deb-tx:#85b7eb;--ok-bg:#173404;--ok-tx:#97c459;--sh:0 1px 2px rgba(0,0,0,.4),0 12px 30px rgba(0,0,0,.45);--shl:0 18px 56px rgba(0,0,0,.6)}}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;line-height:1.5;-webkit-font-smoothing:antialiased;-webkit-text-size-adjust:100%}
  svg{flex:none}
  a.back{position:fixed;top:13px;left:13px;z-index:40;display:inline-flex;align-items:center;gap:6px;background:var(--card);color:var(--ink);text-decoration:none;font-size:.82rem;font-weight:650;padding:8px 13px;border-radius:999px;border:1px solid var(--line);box-shadow:var(--sh)}
  a.back:hover{color:var(--c1);border-color:var(--c1)}
  header.hero{background:radial-gradient(120% 150% at 0% 0%,#13899f 0%,#0e7490 48%,#0a4254 100%);color:#fff;padding:46px 18px 30px;text-align:center}
  .hero-in{max-width:780px;margin:0 auto}
  .kick{display:inline-block;font-size:.68rem;letter-spacing:.16em;text-transform:uppercase;opacity:.92;background:rgba(255,255,255,.16);padding:5px 12px;border-radius:999px}
  header.hero h1{margin:.4em 0 .14em;font-size:clamp(1.4rem,4.6vw,2rem);font-weight:850;letter-spacing:-.01em}
  header.hero p{margin:0 auto;opacity:.95;font-size:.95rem;max-width:32em}
  .who{margin-top:14px;display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;font-size:.82rem}
  .avs{display:inline-flex}
  .av{width:26px;height:26px;border-radius:50%;display:grid;place-items:center;font-size:.66rem;font-weight:700;color:#0a4254;background:#bfe6ef;border:2px solid #0e7490;margin-left:-7px}
  .av:first-child{margin-left:0}
  .me{background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.3);color:#fff;padding:4px 11px;border-radius:999px;cursor:pointer;display:inline-flex;gap:6px;align-items:center}
  main{max-width:780px;margin:0 auto;padding:8px 14px 120px}
  .bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:space-between;margin:14px 2px 6px}
  .legend{display:flex;gap:13px;flex-wrap:wrap;font-size:.76rem;color:var(--soft)}
  .legend span{display:inline-flex;align-items:center;gap:6px}
  .ld{width:9px;height:9px;border-radius:50%}
  .tools{display:flex;gap:8px;flex-wrap:wrap}
  .tbtn{display:inline-flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--line);color:var(--ink);border-radius:999px;padding:7px 13px;font-size:.82rem;font-weight:600;cursor:pointer}
  .tbtn:hover{border-color:var(--c1);color:var(--c1)}
  .banner{display:flex;gap:11px;align-items:flex-start;background:#fdeecf;color:#8a5a12;border:1.5px solid #f0cd86;border-radius:var(--rs);padding:13px 15px;margin:12px 2px;font-size:.86rem;font-weight:600}
  .phase{margin:26px 0 2px}
  .pbadge{display:inline-flex;align-items:center;gap:7px;border-radius:999px;padding:4px 13px;font-size:.78rem;font-weight:750}
  .conn{width:2px;height:16px;background:var(--line);margin:2px 0 2px 33px}
  .card{position:relative;background:var(--card);border:1px solid var(--line);border-left:4px solid var(--pc,#0e7490);border-radius:var(--r);box-shadow:var(--sh);padding:14px 15px;margin:0}
  .chead{display:flex;gap:11px;align-items:flex-start}
  .num{flex:none;width:30px;height:30px;border-radius:50%;background:var(--pc,#0e7490);color:#fff;display:grid;place-items:center;font-weight:750;font-size:.92rem}
  .title{flex:1;margin:3px 0;font-size:1.04rem;font-weight:700;cursor:text}
  .title:hover{color:var(--c1)}
  .stp{flex:none;font-size:.74rem;font-weight:700;border:none;border-radius:999px;padding:4px 11px;cursor:pointer}
  .st-flou{background:var(--flou-bg);color:var(--flou-tx)} .st-deb{background:var(--deb-bg);color:var(--deb-tx)} .st-ok{background:var(--ok-bg);color:var(--ok-tx)}
  .qline{display:flex;gap:8px;align-items:flex-start;margin:9px 0 4px 41px;font-size:.9rem;color:var(--soft)}
  .qline .qm{flex:none;width:20px;height:20px;border-radius:50%;background:var(--c1soft);color:var(--c1);display:grid;place-items:center;font-weight:800;font-size:.78rem}
  .qline span.qx{cursor:text} .qline span.qx:hover{color:var(--c1)}
  .retenu{margin:8px 0 2px 41px;display:flex;gap:7px;align-items:center;background:var(--ok-bg);color:var(--ok-tx);border-radius:var(--rs);padding:7px 11px;font-size:.86rem;font-weight:650}
  .props{margin:9px 0 0 41px;display:flex;flex-direction:column;gap:7px}
  .prop{display:flex;flex-direction:column;gap:8px;background:var(--bg);border:1.5px solid var(--line);border-radius:var(--rs);padding:9px 11px}
  .prop.lead{border-color:var(--c1);background:var(--c1soft)}
  .prop.ret{border-color:var(--ok-tx)}
  .prow1{display:flex;align-items:flex-start;gap:9px}
  .prow2{display:flex;align-items:center;gap:7px}
  .prow2 .sp{flex:1}
  .picon{flex:none;display:grid;place-items:center;margin-top:1px}
  .ptxt{flex:1;font-size:.9rem;min-width:0;line-height:1.4}

  .lead-tag{display:inline-flex;align-items:center;gap:4px;font-size:.72rem;font-weight:700;color:var(--c1)}

  .ibtn{flex:none;width:28px;height:28px;border-radius:8px;border:1px solid var(--line);background:var(--card);color:var(--soft);display:grid;place-items:center;cursor:pointer}

  .ibtn.ret.on{background:var(--ok-bg);color:var(--ok-tx);border-color:var(--ok-tx)}

  .note b{color:var(--c1);font-weight:700}
  .addnote{align-self:flex-start;background:none;border:none;color:var(--soft);font-size:.8rem;font-weight:600;cursor:pointer;padding:2px 0}
  .addnote:hover{color:var(--c1)}
  .cfoot{margin-top:11px;display:flex;gap:8px;justify-content:flex-end}
  .cfoot button{background:none;border:none;color:var(--soft);font-size:.78rem;cursor:pointer;display:inline-flex;gap:5px;align-items:center}
  .cfoot button:hover{color:#b3261e}
  .ins{display:flex;justify-content:center;margin:3px 0}
  .ins button{background:none;border:none;color:var(--soft);font-size:.78rem;font-weight:600;cursor:pointer;display:inline-flex;gap:5px;align-items:center;opacity:.65;padding:5px 10px;border-radius:999px}
  .ins button:hover{opacity:1;color:var(--c1);background:var(--c1soft)}
  .ov{position:fixed;inset:0;background:rgba(8,18,22,.55);display:grid;place-items:center;z-index:90;padding:18px}
  .modal{background:var(--card);border-radius:var(--r);box-shadow:var(--shl);width:100%;max-width:420px;padding:20px}
  .modal h3{margin:0 0 14px;font-size:1.15rem}
  .mfield{display:block;margin-bottom:12px}
  .mfield span{display:block;font-size:.82rem;color:var(--soft);margin-bottom:5px;font-weight:600}
  .mfield input,.mfield textarea,.mfield select{width:100%;padding:10px 12px;font:inherit;color:var(--ink);background:var(--bg);border:1.5px solid var(--line);border-radius:var(--rs)}
  .mfield textarea{min-height:78px;resize:vertical}
  .mfield input:focus,.mfield textarea:focus,.mfield select:focus{outline:none;border-color:var(--c1);box-shadow:0 0 0 3px var(--c1soft)}
  .mbtns{display:flex;gap:9px;justify-content:flex-end;margin-top:6px}
  .btn{display:inline-flex;align-items:center;gap:7px;padding:10px 18px;border-radius:var(--rs);background:var(--c1);color:#fff;font:inherit;font-weight:700;border:none;cursor:pointer}

  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:var(--bg);padding:11px 19px;border-radius:999px;font-size:.86rem;font-weight:600;opacity:0;transition:.26s;pointer-events:none;z-index:95;box-shadow:var(--shl)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  @media print{
    a.back,.who,.tools,.banner,.stp,.vote,.ibtn,.addprop,.addnote,.cfoot,.ins,.me{display:none!important}
    header.hero{background:#0e7490!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
    .card{box-shadow:none;break-inside:avoid}
  }
</style>

};

const NEXTST={flou:"deb",deb:"ok",ok:"flou"};

const SEED=[
  {id:"s01",ordre:10,phase:1,titre:"Attribution d'un référent à chaque élève",question:"",props:[{id:"a",txt:"Le professeur principal organise la répartition",role:"Prof principal"}],retenu:"a",statut:"ok"},
  {id:"s02",ordre:20,phase:1,titre:"L'élève reçoit la fiche de négociation et la pré-convention",question:"Qui imprime et remet ces deux documents à l'élève ?",props:[{id:"a",txt:"Le référent",role:"Référent"},{id:"b",txt:"L'enseignant pro",role:"Enseignant pro"},{id:"c",txt:"Le professeur principal",role:"Prof principal"}],retenu:null,statut:"flou"},

/* ---------- modale générique ---------- */
function openForm(title, fields, okLabel){
  return new Promise(res=>{
    const ov=document.createElement("div");ov.className="ov";
    ov.innerHTML=`<div class="modal"><h3>${esc(title)}</h3><div class="mfields"></div><div class="mbtns"><button class="btn ghost" data-x="c">Annuler</button><button class="btn" data-x="o">${esc(okLabel||"Valider")}</button></div></div>`;
    const mf=ov.querySelector(".mfields");
    fields.forEach(f=>{
      const w=document.createElement("label");w.className="mfield";
      const sp=document.createElement("span");sp.textContent=f.label;w.appendChild(sp);
      let c;
      if(f.type==="textarea"){c=document.createElement("textarea");}
      else if(f.type==="select"){c=document.createElement("select");(f.options||[]).forEach(o=>{const op=document.createElement("option");op.value=o;op.textContent=o;c.appendChild(op);});}
      else{c=document.createElement("input");c.type="text";}
      if(f.value!=null)c.value=f.value; if(f.ph)c.placeholder=f.ph; c.dataset.k=f.key;
      w.appendChild(c);mf.appendChild(w);
    });
    document.body.appendChild(ov);
    const first=mf.querySelector("input,textarea,select");if(first)setTimeout(()=>first.focus(),30);
    function close(v){ov.remove();res(v);}
    ov.addEventListener("keydown",e=>{if(e.key==="Escape")close(null);if(e.key==="Enter"&&e.target.tagName!=="TEXTAREA"){e.preventDefault();collect();}});
    function collect(){const v={};mf.querySelectorAll("[data-k]").forEach(c=>v[c.dataset.k]=(c.value||"").trim());close(v);}
    ov.addEventListener("click",e=>{if(e.target===ov)return close(null);const x=e.target.closest("[data-x]");if(!x)return;x.dataset.x==="c"?close(null):collect();});
  });
}

/* ---------- identité ---------- */
async function ensureMe(){
  if(ME&&ME.pseudo) return true;
  const v=await openForm("Bienvenue — qui es-tu ?",[
    {key:"pseudo",label:"Ton identifiant (ex. PSE, ou ton prénom)",type:"text",ph:"PSE"},
    {key:"role",label:"Ton rôle (ça reste anonyme)",type:"select",options:ROLES.concat(["Autre"])}
  ],"Entrer");
  if(!v||!v.pseudo){return false;}
  ME={pseudo:v.pseudo.replace(/\|/g,"").slice(0,24),role:v.role||"Équipe"};
  localStorage.setItem("parcours_id",JSON.stringify(ME));
  joinPresence(); renderWho(); return true;
}
async function need(){ if(DEMO){toast("Aperçu — publie la règle Firestore pour participer");return false;} return await ensureMe(); }

/* ---------- présence ---------- */
function joinPresence(){
  if(DEMO||!ME) return;
  const beat=()=>setDoc(doc(presCol,MYPID),{pseudo:ME.pseudo,role:ME.role,ts:Date.now()}).catch(()=>{});
  beat(); clearInterval(window.__pb); window.__pb=setInterval(beat,25000);
}
function renderWho(connected){
  const box=$("who"); const list=(connected||[]).filter(p=>Date.now()-(p.ts||0)<70000);
  const avs=list.slice(0,6).map(p=>`<span class="av" title="${esc(p.pseudo)} · ${esc(p.role||"")}">${esc((p.pseudo||"?").slice(0,3))}</span>`).join("");
  const meTxt=ME?`Tu es <b>${esc(ME.pseudo)}</b> · ${esc(ME.role)}`:"Rejoindre pour participer";
  box.innerHTML=`${list.length?`<span class="avs">${avs}</span>`:""}<span class="me" id="mebtn">${meTxt} <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg></span>`;
  $("mebtn").onclick=async()=>{ME=null;localStorage.removeItem("parcours_id");await ensureMe();};
}

/* ---------- rendu ---------- */
function stepCard(s,n){
  const ph=PHASES[s.phase]||PHASES[1];
  const votes=s.votes||[];
  const counts={}; let maxc=0;
  (s.props||[]).forEach(p=>{const c=votes.filter(v=>v.indexOf(p.id+"||")===0).length;counts[p.id]=c;if(c>maxc)maxc=c;});
  const retText=s.retenu?(s.props||[]).find(p=>p.id===s.retenu):null;
  const props=(s.props||[]).map(p=>{
    const c=counts[p.id]||0, voted=ME&&votes.includes(p.id+"||"+ME.pseudo);
    const lead=c>0&&c===maxc, isret=s.retenu===p.id;
    return `<div class="prop${lead?" lead":""}${isret?" ret":""}">
      <div class="prow1"><span class="picon">${roleIcon(p.role,18)}</span><span class="ptxt">${esc(p.txt)}${p.role?` <small>· ${esc(p.role)}</small>`:""}</span></div>
      <div class="prow2">
        <button class="vote${voted?" on":""}" data-act="vote" data-id="${s.id}" data-pid="${p.id}" title="Voter">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="m6 15 6-6 6 6"/></svg>${c} vote${c>1?"s":""}</button>
        ${lead?`<span class="lead-tag"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.5l4.5 4.5L19 7"/></svg> majorité</span>`:""}
        <span class="sp"></span>
        <button class="ibtn ret${isret?" on":""}" data-act="retain" data-id="${s.id}" data-pid="${p.id}" title="Marquer comme réponse retenue"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.5l4.5 4.5L19 7"/></svg></button>
        <button class="ibtn" data-act="delprop" data-id="${s.id}" data-pid="${p.id}" title="Supprimer cette proposition"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
      </div>
    </div>`;
  }).join("");
  const notes=(s.notes||[]).map(nt=>`<div class="note"><b>${esc(nt.p)}${nt.r?" · "+esc(nt.r):""}</b> — ${esc(nt.t)}</div>`).join("");
  return `<article class="card" style="--pc:${ph.c}">
    <div class="chead">
      <span class="num">${n}</span>
      <h3 class="title" data-act="title" data-id="${s.id}">${esc(s.titre)}</h3>
      <button class="stp st-${s.statut}" data-act="statut" data-id="${s.id}" title="Cliquer pour changer le statut">${STATUTS[s.statut]||"À clarifier"}</button>
    </div>
    ${(s.question||"")?`<div class="qline"><span class="qm">?</span><span class="qx" data-act="question" data-id="${s.id}">${esc(s.question)}</span></div>`:`<div class="qline"><span class="qm">?</span><span class="qx" data-act="question" data-id="${s.id}" style="opacity:.6">Ajouter une question à trancher…</span></div>`}
    ${retText?`<div class="retenu"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.5l4.5 4.5L19 7"/></svg> Réponse retenue : ${esc(retText.txt)}</div>`:""}
    <div class="props">${props}<button class="addprop" data-act="addprop" data-id="${s.id}">+ proposer une réponse</button></div>
    <div class="notes">${notes}<button class="addnote" data-act="addnote" data-id="${s.id}">+ ajouter une note</button></div>
    <div class="cfoot"><button data-act="delstep" data-id="${s.id}"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg> Supprimer l'étape</button></div>
  </article>`;
}
function insRow(afterId){return `<div class="ins"><button data-act="insert" data-id="${afterId||""}"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg> insérer une étape ici</button></div>`;}

function render(){
  const list=$("list");
  if(!STEPS.length){list.innerHTML=`<p style="color:var(--soft);text-align:center;padding:40px">Chargement du parcours…</p>`;return;}
  let html=insRow(""); let n=0, curPhase=null;
  STEPS.forEach(s=>{
    if(s.phase!==curPhase){const ph=PHASES[s.phase]||PHASES[1];curPhase=s.phase;html+=`<div class="phase"><span class="pbadge" style="background:${ph.bg};color:${ph.tx}">Phase ${s.phase} · ${ph.t}</span></div>`;}
    else{html+=`<div class="conn"></div>`;}
    n++; html+=stepCard(s,n); html+=insRow(s.id);
  });
  list.innerHTML=html;
}
function renderBanner(){
  $("bannerbox").innerHTML = DEMO
    ? `<div class="banner"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 9v4m0 4h.01M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/></svg><span>Mode aperçu — la collaboration en direct s'activera une fois la règle Firestore <b>coordination_parcours</b> publiée.</span></div>`
    : "";
}

/* ---------- actions ---------- */
function findStep(id){return STEPS.find(s=>s.id===id);}
$("list").addEventListener("click",async e=>{
  const b=e.target.closest("[data-act]"); if(!b) return;
  const act=b.dataset.act, id=b.dataset.id, pid=b.dataset.pid, s=findStep(id);
  const ref=id?doc(etapesCol,id):null;
  if(act==="statut"){ if(!await need())return; await updateDoc(ref,{statut:NEXTST[s.statut]||"deb",updatedAt:serverTimestamp()}); return; }
  if(act==="title"){ if(!await need())return; const v=await openForm("Modifier le titre de l'étape",[{key:"t",label:"Titre",type:"text",value:s.titre}]); if(v&&v.t)await updateDoc(ref,{titre:v.t,updatedAt:serverTimestamp()}); return; }
  if(act==="question"){ if(!await need())return; const v=await openForm("La question à trancher",[{key:"t",label:"Question",type:"textarea",value:s.question||"",ph:"ex. Qui remet la pré-convention à l'élève ?"}]); if(v)await updateDoc(ref,{question:v.t,updatedAt:serverTimestamp()}); return; }
  if(act==="addprop"){ if(!await need())return; const v=await openForm("Proposer une réponse",[{key:"txt",label:"Ta proposition",type:"text",ph:"ex. Le référent imprime et la remet"},{key:"role",label:"Acteur concerné (facultatif)",type:"select",options:["—"].concat(ROLES)}]); if(v&&v.txt)await updateDoc(ref,{props:arrayUnion({id:uid().slice(0,8),txt:v.txt,role:v.role==="—"?"":v.role}),updatedAt:serverTimestamp()}); return; }
  if(act==="vote"){ if(!await need())return; const key=pid+"||"+ME.pseudo; const has=(s.votes||[]).includes(key); await updateDoc(ref,{votes:has?arrayRemove(key):arrayUnion(key),updatedAt:serverTimestamp()}); return; }
  if(act==="retain"){ if(!await need())return; const nv=s.retenu===pid?null:pid; await updateDoc(ref,nv?{retenu:nv,statut:"ok",updatedAt:serverTimestamp()}:{retenu:null,updatedAt:serverTimestamp()}); return; }
  if(act==="delprop"){ if(!await need())return; if(!confirm("Supprimer cette proposition ?"))return; const np=(s.props||[]).filter(p=>p.id!==pid); const nvv=(s.votes||[]).filter(v=>v.indexOf(pid+"||")!==0); await updateDoc(ref,{props:np,votes:nvv,retenu:s.retenu===pid?null:s.retenu,updatedAt:serverTimestamp()}); return; }
  if(act==="addnote"){ if(!await need())return; const v=await openForm("Ajouter une note",[{key:"t",label:"Ta note",type:"textarea",ph:"Une remarque, une précision, une objection…"}]); if(v&&v.t)await updateDoc(ref,{notes:arrayUnion({p:ME.pseudo,r:ME.role,t:v.t,ts:Date.now()}),updatedAt:serverTimestamp()}); return; }
  if(act==="delstep"){ if(!await need())return; if(!confirm("Supprimer définitivement cette étape ? Cette action est irréversible."))return; await deleteDoc(ref); toast("Étape supprimée"); return; }
  if(act==="insert"){ if(!await need())return;
    const idx=id?STEPS.findIndex(x=>x.id===id):-1;
    const prev=idx>=0?STEPS[idx]:null, next=STEPS[idx+1];
    let ordre; if(!prev)ordre=(STEPS[0]?STEPS[0].ordre:10)-5; else if(!next)ordre=prev.ordre+10; else ordre=(prev.ordre+next.ordre)/2;
    const phase=prev?prev.phase:(STEPS[0]?STEPS[0].phase:1);
    const v=await openForm("Insérer une étape",[{key:"t",label:"Titre de la nouvelle étape",type:"text",ph:"ex. Vérification des dates par le DDF"},{key:"ph",label:"Phase",type:"select",options:["1 · Recherche & négociation","2 · Conventionnement","3 · Départ & stage","4 · Bilan & après"]}]);
    if(v&&v.t){const pnum=parseInt(v.ph)||phase; await addDoc(etapesCol,{ordre,phase:pnum,titre:v.t,question:"",props:[],votes:[],notes:[],retenu:null,statut:"flou",createdAt:serverTimestamp(),updatedAt:serverTimestamp()});}
    return;
  }
});
$("tprint").addEventListener("click",()=>window.print());

/* ---------- démarrage ---------- */
function toStep(d){const x=d.data?d.data():d;return {id:d.id||x.id,ordre:x.ordre,phase:x.phase,titre:x.titre,question:x.question,props:x.props||[],votes:x.votes||[],notes:x.notes||[],retenu:x.retenu??null,statut:x.statut||"flou"};}
async function seedIfEmpty(){
  if(seeding)return; seeding=true;
  try{ for(const s of SEED){ await setDoc(doc(etapesCol,s.id),{ordre:s.ordre,phase:s.phase,titre:s.titre,question:s.question,props:s.props,votes:[],notes:[],retenu:s.retenu,statut:s.statut,createdAt:serverTimestamp(),updatedAt:serverTimestamp()},{merge:true}); } }
  catch(e){ console.error(e); }
}
function startDemo(){ DEMO=true; STEPS=SEED.map(s=>({...s,votes:[],notes:[]})); renderBanner(); render(); renderWho([]); }

renderWho([]);
onSnapshot(query(etapesCol,orderBy("ordre")), snap=>{
  if(snap.empty){ seedIfEmpty(); return; }
  STEPS=snap.docs.map(toStep); DEMO=false; renderBanner(); render();
}, err=>{ console.warn("Firestore indisponible:",err.code); startDemo(); });
onSnapshot(presCol, snap=>{ renderWho(snap.docs.map(d=>d.data())); }, ()=>{});

if(ME) joinPresence();
</script>
</body>
</html>
